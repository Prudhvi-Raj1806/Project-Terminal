<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaDev IDE</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #0d0f14;
    --bg-panel: #111318;
    --bg-sidebar: #0f1115;
    --bg-tab: #0d0f14;
    --bg-tab-active: #111318;
    --bg-terminal: #080a0e;
    --bg-hover: #1a1d24;
    --bg-selected: #1e2130;
    --bg-highlight: #2a2d3a;

    --border: #1e2230;
    --border-subtle: #181b24;
    --border-accent: #3b4263;

    --text-primary: #cdd6f4;
    --text-secondary: #9399b2;
    --text-muted: #585b70;
    --text-dim: #313244;

    --accent-blue: #89b4fa;
    --accent-cyan: #89dceb;
    --accent-green: #a6e3a1;
    --accent-yellow: #f9e2af;
    --accent-orange: #fab387;
    --accent-red: #f38ba8;
    --accent-purple: #cba6f7;
    --accent-pink: #f5c2e7;
    --accent-teal: #94e2d5;

    --token-keyword: #cba6f7;
    --token-string: #a6e3a1;
    --token-number: #fab387;
    --token-comment: #6c7086;
    --token-function: #89b4fa;
    --token-class: #f9e2af;
    --token-operator: #89dceb;
    --token-property: #f5c2e7;
    --token-param: #cdd6f4;
    --token-type: #94e2d5;
    --token-builtin: #89dceb;
    --token-punctuation: #7f849c;
    --token-tag: #f38ba8;
    --token-attr: #fab387;

    --gutter-width: 52px;
    --font-code: 'JetBrains Mono', 'Cascadia Code', monospace;
    --font-ui: 'Geist Mono', 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100vh;
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-ui);
    overflow: hidden;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── L A Y O U T ── */
  .app { display: flex; flex-direction: column; height: 100vh; }

  .titlebar {
    height: 38px;
    background: var(--bg-sidebar);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px;
    gap: 8px;
    position: relative;
    flex-shrink: 0;
    user-select: none;
  }
  .titlebar-dots { display: flex; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: filter .15s; }
  .dot:hover { filter: brightness(1.3); }
  .dot-red { background: #f38ba8; }
  .dot-yellow { background: #f9e2af; }
  .dot-green { background: #a6e3a1; }
  .titlebar-title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 11.5px; color: var(--text-muted); letter-spacing: .5px;
    display: flex; align-items: center; gap: 8px;
  }
  .titlebar-title .icon { color: var(--accent-blue); }
  .titlebar-actions { margin-left: auto; display: flex; gap: 4px; }
  .titlebar-btn {
    padding: 3px 10px; border-radius: 4px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-secondary); font-family: var(--font-ui);
    font-size: 10.5px; cursor: pointer; letter-spacing: .3px;
    transition: all .15s;
  }
  .titlebar-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

  .workspace { display: flex; flex: 1; overflow: hidden; }

  /* ── ACTIVITY BAR ── */
  .activity-bar {
    width: 46px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border-subtle);
    display: flex; flex-direction: column;
    align-items: center; padding: 8px 0;
    gap: 2px; flex-shrink: 0;
  }
  .activity-icon {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; cursor: pointer;
    color: var(--text-muted); font-size: 16px;
    transition: all .15s; position: relative;
  }
  .activity-icon:hover { color: var(--text-primary); background: var(--bg-hover); }
  .activity-icon.active { color: var(--accent-blue); background: rgba(137,180,250,.08); }
  .activity-icon.active::before {
    content: ''; position: absolute; left: -10px; top: 50%; transform: translateY(-50%);
    width: 2px; height: 20px; background: var(--accent-blue);
    border-radius: 0 2px 2px 0;
  }
  .activity-bottom { margin-top: auto; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    flex-shrink: 0; overflow: hidden;
  }
  .sidebar-header {
    padding: 10px 14px 6px;
    font-size: 10px; letter-spacing: 1.2px;
    color: var(--text-muted); text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border-subtle);
  }
  .sidebar-actions { display: flex; gap: 6px; }
  .sidebar-action {
    width: 18px; height: 18px; display: flex;
    align-items: center; justify-content: center;
    border-radius: 3px; cursor: pointer;
    color: var(--text-muted); font-size: 13px;
    transition: all .12s;
  }
  .sidebar-action:hover { color: var(--text-primary); background: var(--bg-hover); }

  .file-tree { flex: 1; overflow-y: auto; padding: 4px 0; }
  .file-tree::-webkit-scrollbar { width: 4px; }
  .file-tree::-webkit-scrollbar-track { background: transparent; }
  .file-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .tree-item {
    display: flex; align-items: center;
    padding: 2.5px 0; padding-right: 8px;
    cursor: pointer; border-radius: 4px;
    transition: background .1s; position: relative;
    user-select: none;
  }
  .tree-item:hover { background: var(--bg-hover); }
  .tree-item.active { background: var(--bg-selected); }
  .tree-item.active::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px; background: var(--accent-blue);
    border-radius: 0 2px 2px 0;
  }

  .tree-indent { display: flex; align-items: center; flex-shrink: 0; }
  .tree-chevron {
    width: 16px; height: 16px; display: flex;
    align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 9px; flex-shrink: 0;
    transition: transform .15s;
  }
  .tree-chevron.open { transform: rotate(90deg); }
  .tree-icon { width: 16px; flex-shrink: 0; text-align: center; font-size: 13px; margin: 0 3px; }
  .tree-name { font-size: 12.5px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tree-item.active .tree-name { color: var(--text-primary); }
  .tree-item:hover .tree-name { color: var(--text-primary); }

  .tree-badge {
    margin-left: auto; font-size: 9px;
    padding: 1px 5px; border-radius: 8px;
    background: rgba(243,139,168,.15); color: var(--accent-red);
  }
  .tree-badge.green { background: rgba(166,227,161,.12); color: var(--accent-green); }

  /* ── MAIN CONTENT ── */
  .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  /* ── TABS ── */
  .tabs-bar {
    display: flex; align-items: stretch;
    background: var(--bg-tab);
    border-bottom: 1px solid var(--border);
    overflow-x: auto; flex-shrink: 0;
  }
  .tabs-bar::-webkit-scrollbar { height: 2px; }
  .tabs-bar::-webkit-scrollbar-thumb { background: var(--border); }

  .tab {
    display: flex; align-items: center; gap: 6px;
    padding: 0 14px; height: 36px;
    border-right: 1px solid var(--border);
    cursor: pointer; white-space: nowrap;
    font-size: 12px; color: var(--text-muted);
    transition: all .12s; position: relative;
    min-width: 120px; max-width: 180px;
    background: var(--bg-tab);
  }
  .tab:hover { background: var(--bg-hover); color: var(--text-secondary); }
  .tab.active {
    background: var(--bg-tab-active); color: var(--text-primary);
    border-top: 1px solid var(--accent-blue);
    border-top-left-radius: 3px; border-top-right-radius: 3px;
  }
  .tab-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-orange); flex-shrink: 0;
  }
  .tab-close {
    margin-left: auto; width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 3px; font-size: 10px; color: var(--text-muted);
    transition: all .12s; flex-shrink: 0;
  }
  .tab-close:hover { background: var(--bg-highlight); color: var(--text-primary); }

  /* ── BREADCRUMB ── */
  .breadcrumb {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 16px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-subtle);
    font-size: 11.5px; color: var(--text-muted); flex-shrink: 0;
  }
  .breadcrumb-sep { color: var(--text-dim); }
  .breadcrumb-item { color: var(--text-secondary); cursor: pointer; }
  .breadcrumb-item:hover { color: var(--accent-blue); }
  .breadcrumb-item.active { color: var(--text-primary); cursor: default; }

  /* ── EDITOR ── */
  .editor-container { flex: 1; overflow: hidden; display: flex; position: relative; }

  .editor-scroll { flex: 1; overflow: auto; display: flex; }
  .editor-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .editor-scroll::-webkit-scrollbar-track { background: var(--bg-panel); }
  .editor-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .editor-scroll::-webkit-scrollbar-corner { background: var(--bg-panel); }

  .line-numbers {
    width: var(--gutter-width); min-width: var(--gutter-width);
    background: var(--bg-panel);
    border-right: 1px solid var(--border-subtle);
    padding: 16px 0; text-align: right;
    flex-shrink: 0; user-select: none;
  }
  .ln {
    display: block; padding: 0 12px 0 8px;
    font-size: 12px; line-height: 21px;
    color: var(--text-dim); font-family: var(--font-code);
    transition: color .1s;
  }
  .ln.active { color: var(--accent-blue); }
  .ln:hover { color: var(--text-muted); cursor: pointer; }

  .code-area {
    flex: 1; padding: 16px 24px 16px 16px;
    background: var(--bg-panel);
    font-family: var(--font-code); font-size: 13px;
    line-height: 21px; white-space: pre;
    overflow: visible; min-width: max-content;
    cursor: text;
  }

  .code-line {
    display: block; position: relative;
    border-radius: 2px; transition: background .1s;
    padding: 0 4px; margin: 0 -4px;
  }
  .code-line:hover { background: rgba(255,255,255,.02); }
  .code-line.highlighted { background: rgba(137,180,250,.06); }
  .code-line.error-line { background: rgba(243,139,168,.05); }

  .cursor {
    display: inline-block; width: 2px; height: 15px;
    background: var(--accent-blue);
    vertical-align: middle; margin-left: 1px;
    animation: blink 1.1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── TOKENS ── */
  .kw { color: var(--token-keyword); font-style: italic; }
  .str { color: var(--token-string); }
  .num { color: var(--token-number); }
  .cmt { color: var(--token-comment); font-style: italic; }
  .fn { color: var(--token-function); }
  .cls { color: var(--token-class); }
  .op { color: var(--token-operator); }
  .prop { color: var(--token-property); }
  .prm { color: var(--token-param); }
  .typ { color: var(--token-type); }
  .blt { color: var(--token-builtin); }
  .punc { color: var(--token-punctuation); }
  .tag { color: var(--token-tag); }
  .atr { color: var(--token-attr); }
  .deco { color: var(--accent-yellow); }

  /* ── MINIMAP ── */
  .minimap {
    width: 80px; background: var(--bg-base);
    border-left: 1px solid var(--border-subtle);
    overflow: hidden; flex-shrink: 0;
    position: relative; cursor: pointer;
  }
  .minimap-inner { padding: 16px 8px; transform-origin: top right; transform: scale(0.2); width: 500%; }
  .minimap-viewport {
    position: absolute; left: 0; right: 0; top: 16px; height: 60px;
    background: rgba(137,180,250,.06);
    border: 1px solid rgba(137,180,250,.15);
    pointer-events: none;
  }

  /* ── SPLIT ── */
  .editor-terminal-split { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .split-handle {
    height: 4px; background: var(--border); cursor: row-resize;
    position: relative; flex-shrink: 0;
    transition: background .15s;
  }
  .split-handle:hover { background: var(--accent-blue); }

  /* ── TERMINAL ── */
  .terminal-panel {
    height: 200px; background: var(--bg-terminal);
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
    min-height: 120px; overflow: hidden;
  }
  .terminal-tabs {
    display: flex; align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--bg-sidebar);
    padding: 0 8px;
    flex-shrink: 0;
  }
  .term-tab {
    padding: 6px 12px; font-size: 11.5px;
    color: var(--text-muted); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .12s;
  }
  .term-tab.active { color: var(--text-primary); border-bottom-color: var(--accent-blue); }
  .term-tab:hover { color: var(--text-secondary); }
  .terminal-toolbar { margin-left: auto; display: flex; gap: 4px; padding: 0 4px; }
  .term-btn {
    width: 24px; height: 24px; display: flex;
    align-items: center; justify-content: center;
    border-radius: 4px; cursor: pointer; font-size: 12px;
    color: var(--text-muted); transition: all .12s;
  }
  .term-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

  .terminal-body { flex: 1; overflow-y: auto; padding: 10px 14px; font-family: var(--font-code); font-size: 12.5px; line-height: 1.7; }
  .terminal-body::-webkit-scrollbar { width: 4px; }
  .terminal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .term-line { display: block; white-space: pre-wrap; word-break: break-all; }
  .term-prompt { color: var(--accent-green); }
  .term-path { color: var(--accent-blue); }
  .term-cmd { color: var(--text-primary); }
  .term-out { color: var(--text-secondary); }
  .term-err { color: var(--accent-red); }
  .term-warn { color: var(--accent-yellow); }
  .term-info { color: var(--accent-cyan); }
  .term-success { color: var(--accent-green); }

  .terminal-input-row {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 14px 10px;
    flex-shrink: 0;
  }
  .term-prompt-label { color: var(--accent-green); font-family: var(--font-code); font-size: 12.5px; white-space: nowrap; }
  .term-path-label { color: var(--accent-blue); font-family: var(--font-code); font-size: 12.5px; }
  .term-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: var(--font-code); font-size: 12.5px; color: var(--text-primary);
    caret-color: var(--accent-blue);
  }

  /* ── STATUS BAR ── */
  .status-bar {
    height: 24px; background: #1a1d2e;
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 10px; gap: 0;
    flex-shrink: 0; overflow: hidden;
  }
  .status-item {
    display: flex; align-items: center; gap: 4px;
    padding: 0 8px; height: 100%;
    font-size: 11px; color: var(--text-muted);
    cursor: pointer; white-space: nowrap;
    transition: all .12s; border-radius: 3px;
  }
  .status-item:hover { background: rgba(255,255,255,.06); color: var(--text-secondary); }
  .status-item.brand { background: var(--accent-blue); color: var(--bg-base); font-weight: 600; border-radius: 0; padding: 0 10px; margin-right: 4px; }
  .status-item.brand:hover { background: #7aa2f7; }
  .status-item.err { color: var(--accent-red); }
  .status-item.warn { color: var(--accent-yellow); }
  .status-item.ok { color: var(--accent-green); }
  .status-right { margin-left: auto; display: flex; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; margin-right: 2px; }

  /* ── MODAL / PALETTE ── */
  .palette-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
    display: none; align-items: flex-start; justify-content: center;
    padding-top: 120px;
  }
  .palette-overlay.open { display: flex; }
  .palette {
    width: 560px; max-height: 360px;
    background: #16192a; border: 1px solid var(--border-accent);
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,.7);
    display: flex; flex-direction: column;
    animation: paletteIn .18s ease;
  }
  @keyframes paletteIn { from{opacity:0;transform:scale(.97)translateY(-8px)} to{opacity:1;transform:none} }
  .palette-input-row {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .palette-icon { color: var(--text-muted); font-size: 14px; }
  .palette-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: var(--font-ui); font-size: 14px; color: var(--text-primary);
    caret-color: var(--accent-blue);
  }
  .palette-input::placeholder { color: var(--text-muted); }
  .palette-kbd {
    font-size: 10px; color: var(--text-dim); border: 1px solid var(--border);
    padding: 2px 6px; border-radius: 4px;
  }
  .palette-results { overflow-y: auto; padding: 6px; flex: 1; }
  .palette-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 6px; cursor: pointer;
    transition: background .1s;
  }
  .palette-item:hover, .palette-item.focused { background: var(--bg-selected); }
  .palette-item-icon { width: 24px; text-align: center; font-size: 13px; flex-shrink: 0; }
  .palette-item-label { font-size: 13px; color: var(--text-primary); }
  .palette-item-desc { margin-left: auto; font-size: 11px; color: var(--text-muted); }
  .palette-section-header {
    font-size: 10px; letter-spacing: .8px; text-transform: uppercase;
    color: var(--text-dim); padding: 8px 10px 4px;
  }

  /* ── TOOLTIP ── */
  .tooltip {
    position: fixed; z-index: 200;
    background: #1e2130; border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 14px;
    font-family: var(--font-code); font-size: 12px;
    color: var(--text-secondary); max-width: 320px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    pointer-events: none; display: none;
    line-height: 1.7;
  }
  .tooltip.visible { display: block; }
  .tooltip-header { color: var(--accent-yellow); margin-bottom: 4px; font-weight: 600; }
  .tooltip-type { color: var(--accent-cyan); margin-bottom: 6px; font-style: italic; }
  .tooltip-desc { color: var(--text-secondary); }

  /* ── GUTTER DECORATIONS ── */
  .gutter-deco {
    width: 20px; flex-shrink: 0; display: flex;
    flex-direction: column; padding: 16px 2px; background: var(--bg-panel);
  }
  .gd { height: 21px; width: 16px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; border-radius: 2px; transition: all .1s; }
  .gd:hover { background: var(--bg-hover); }
  .gd-bp { color: var(--accent-red); opacity: 0; }
  .gd-bp.set { opacity: 1; }
  .gd-bp.hover { opacity: .4; }

  /* ── INLINE DIFF ── */
  .diff-add { background: rgba(166,227,161,.08); border-left: 2px solid var(--accent-green); }
  .diff-del { background: rgba(243,139,168,.08); border-left: 2px solid var(--accent-red); text-decoration: line-through; color: var(--text-muted); }

  /* Fade in */
  .app { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<div class="app">
  <!-- TITLEBAR -->
  <div class="titlebar">
    <div class="titlebar-dots">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
    </div>
    <div class="titlebar-title">
      <span class="icon">⬡</span> NovaDev IDE — <span style="color:var(--text-secondary)">nova-framework</span>
    </div>
    <div class="titlebar-actions">
      <button class="titlebar-btn" onclick="openPalette()">⌘ K</button>
      <button class="titlebar-btn">⊞ Split</button>
      <button class="titlebar-btn">⚙ Settings</button>
    </div>
  </div>

  <div class="workspace">
    <!-- ACTIVITY BAR -->
    <div class="activity-bar">
      <div class="activity-icon active" title="Explorer" onclick="setActivity(this)">⊞</div>
      <div class="activity-icon" title="Search" onclick="setActivity(this)">⊕</div>
      <div class="activity-icon" title="Source Control" onclick="setActivity(this)">⎇</div>
      <div class="activity-icon" title="Debug" onclick="setActivity(this)">▷</div>
      <div class="activity-icon" title="Extensions" onclick="setActivity(this)">⊡</div>
      <div class="activity-icon activity-bottom" title="Settings" onclick="setActivity(this)">⚙</div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        Explorer

function renderFileTree() {
  const tree = document.getElementById('fileTree');
  tree.innerHTML = '';
  flattenTree(fileSystem[0].children, tree);
}

function flattenTree(items, container) {
  items.forEach(item => {
    const el = document.createElement('div');
    el.innerHTML = buildTreeItem(item);
    const div = el.firstChild;
    container.appendChild(div);
    if (item.type === 'folder' && item.open && item.children) {
      flattenTree(item.children, container);
    }
  });
}

function buildTreeItem(item) {
  const indent = item.depth * 14;

  const badge = item.badge ? `<span class="tree-badge ${item.badge==='M'?'':'green'}">${item.badge}</span>` : '';
  const activeClass = item.type==='file' && item.name===activeFile ? 'active' : '';
  return `<div class="tree-item ${activeClass}" onclick="treeClick('${item.id}','${item.name}','${item.type}')" data-id="${item.id}">
    ${chevron}
    <span class="tree-icon">${icon}</span>
    <span class="tree-name">${item.name}</span>
    ${badge}
  </div>`;
}

function findNode(id, nodes) {
  for (const n of nodes) {
    if (n.id === id) return n;
    if (n.children) { const f = findNode(id, n.children); if (f) return f; }
  }
}

function treeClick(id, name, type) {
  if (type === 'folder') {
    const node = findNode(id, fileSystem);
    if (node) node.open = !node.open;
    renderFileTree();
  } else {
    openFile(name);
  }
}

// ─────────────────────────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = openTabs.map(f => {
    const active = f === activeFile;
    const ext = f.split('.').pop();
    const icon = FILE_ICONS[ext] || FILE_ICONS.default;
    return `<div class="tab ${active?'active':''}" onclick="setActiveFile('${f}')">
      ${icon} <span>${f}</span>
      ${active ? '<span class="tab-dot"></span>' : ''}
      <span class="tab-close" onclick="closeTab(event,'${f}')">✕</span>
    </div>`;
  }).join('');
}

function openFile(name) {
  if (!openTabs.includes(name)) openTabs.push(name);
  setActiveFile(name);
}

function setActiveFile(name) {
  activeFile = name;
  document.getElementById('breadcrumbFile').textContent = name;
  renderTabs();
  renderEditor();
  renderFileTree();
}

function closeTab(e, name) {
  e.stopPropagation();
  openTabs = openTabs.filter(t => t !== name);
  if (activeFile === name) activeFile = openTabs[openTabs.length-1] || null;
  renderTabs();
  if (activeFile) renderEditor(); else document.getElementById('codeArea').innerHTML = '';
}

// ─────────────────────────────────────────────────────────────────
// EDITOR
// ─────────────────────────────────────────────────────────────────
function renderEditor() {
  const file = FILES[activeFile];
  if (!file) { document.getElementById('codeArea').innerHTML = `<span style="color:var(--text-muted)">// File content not available</span>`; return; }

  const lines = file.content;
  const ln = document.getElementById('lineNumbers');
  const ca = document.getElementById('codeArea');
  const gd = document.getElementById('gutterDeco');

  ln.innerHTML = '';
  ca.innerHTML = '';
  gd.innerHTML = '';

  lines.forEach((line, i) => {
    const n = i + 1;
    const isActive = n === activeLine;
    const isBp = breakpoints.has(n);
    const isDiffAdd = [6,7].includes(n) && activeFile==='runtime.ts';
    const isDiffDel = [5].includes(n) && activeFile==='reactive.ts';

    // line number
    const lnEl = document.createElement('span');
    lnEl.className = `ln${isActive?' active':''}`;
    lnEl.textContent = n;
    lnEl.onclick = () => { activeLine = n; renderEditor(); };
    ln.appendChild(lnEl);

    // gutter
    const gdEl = document.createElement('div');
    gdEl.className = `gd gd-bp${isBp?' set':''}`;
    gdEl.textContent = '●';
    gdEl.title = isBp ? 'Remove breakpoint' : 'Add breakpoint';
    gdEl.onclick = () => { isBp ? breakpoints.delete(n) : breakpoints.add(n); renderEditor(); };
    gdEl.onmouseenter = () => { if (!isBp) gdEl.classList.add('hover'); };
    gdEl.onmouseleave = () => gdEl.classList.remove('hover');
    gd.appendChild(gdEl);

    // code line
    const cl = document.createElement('span');
    cl.className = `code-line${isActive?' highlighted':''}${isDiffAdd?' diff-add':''}`;
    cl.innerHTML = (line.html || '&#8203;');
    if (isActive) { cl.innerHTML += '<span class="cursor"></span>'; }
    cl.onclick = () => { activeLine = n; renderEditor(); };
    ca.appendChild(cl);
  });

  // update minimap
  document.getElementById('minimapInner').innerHTML = ca.innerHTML;
}

function appendTermLines(lines) {
  const body = document.getElementById('terminalBody');
  lines.forEach(l => {
    const el = document.createElement('span');
    el.className = `term-line term-${l.type}`;
    el.textContent = l.text;
    body.appendChild(el);
  });
  body.scrollTop = body.scrollHeight;
}

function termExec(cmd) {
  const body = document.getElementById('terminalBody');
  // echo command
  const echo = document.createElement('span');
  echo.className = 'term-line';
  echo.innerHTML = `<span class="term-prompt">➜</span> <span class="term-path">${termCwd}</span> <span class="term-cmd">$ ${cmd}</span>`;
  body.appendChild(echo);

  if (cmd.trim() === '') { body.scrollTop = body.scrollHeight; return; }
  if (cmd === 'clear') { body.innerHTML = ''; return; }

  // cd handling
  if (cmd.startsWith('cd ')) {
    const dir = cmd.slice(3).trim();
    termCwd = dir.startsWith('/') ? dir : `${termCwd}/${dir}`;
    document.getElementById('termPath').textContent = termCwd;
    body.scrollTop = body.scrollHeight; return;
  }

  const handler = COMMANDS[cmd];
  if (handler) {
    const lines = handler();
    appendTermLines(lines);
  } else {
    appendTermLines([{ type:'err', text:`bash: command not found: ${cmd}. Try 'help'.` }]);
  }
  body.scrollTop = body.scrollHeight;
}

document.getElementById('termInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const cmd = this.value.trim();
    termHistory.unshift(cmd);
    histIdx = -1;
    termExec(cmd);
    this.value = '';
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < termHistory.length-1) { histIdx++; this.value = termHistory[histIdx]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; this.value = termHistory[histIdx]; }
    else { histIdx = -1; this.value = ''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    // basic autocomplete
    const cmds = Object.keys(COMMANDS).concat(['clear','cd ']);
    const match = cmds.find(c => c.startsWith(this.value) && c !== this.value);
    if (match) this.value = match;
  }
});

function clearTerminal() { document.getElementById('terminalBody').innerHTML = ''; }

let termVisible = true;
function toggleTerminal() {
  termVisible = !termVisible;
  document.getElementById('terminalPanel').style.display = termVisible ? 'flex' : 'none';
}

// ─────────────────────────────────────────────────────────────────
// SPLIT HANDLE (draggable)
// ─────────────────────────────────────────────────────────────────
(function() {
  const handle = document.getElementById('splitHandle');
  const term = document.getElementById('terminalPanel');
  let dragging = false, startY, startH;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startY = e.clientY;
    startH = term.offsetHeight;
    document.body.style.cursor = 'row-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = startY - e.clientY;
    const newH = Math.max(80, Math.min(400, startH + delta));
    term.style.height = newH + 'px';
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

function openPalette() {
  document.getElementById('paletteOverlay').classList.add('open');

  renderPaletteItems(paletteItems);
}

function closePalette() { document.getElementById('paletteOverlay').classList.remove('open'); document.getElementById('paletteInput').value = ''; }

function closePaletteIfBg(e) { if (e.target === document.getElementById('paletteOverlay')) closePalette(); }

function renderPaletteItems(items) {
  const r = document.getElementById('paletteResults');
  r.innerHTML = '<div class="palette-section-header">Commands & Files</div>' + items.map((it, i) =>
    `<div class="palette-item${i===0?' focused':''}" onclick="it_click(${i})" data-idx="${i}">
      <span class="palette-item-icon">${it.icon}</span>
      <span class="palette-item-label">${it.label}</span>
      <span class="palette-item-desc">${it.desc}</span>
    </div>`
  ).join('');
  window._palItems = items;
}

window.it_click = function(i) { window._palItems[i].action(); closePalette(); };

function filterPalette(val) {
  const filtered = paletteItems.filter(it => it.label.toLowerCase().includes(val.toLowerCase()) || it.desc.toLowerCase().includes(val.toLowerCase()));
  renderPaletteItems(filtered);
}

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openPalette(); }
  if (e.key === 'Escape') closePalette();
  if ((e.metaKey || e.ctrlKey) && e.key === '`') { e.preventDefault(); toggleTerminal(); }
});

// HOVER TOOLTIP
// ─────────────────────────────────────────────────────────────────
const TOOLTIPS = {
  'Runtime': { header:'class Runtime', type:'export class Runtime', desc:'Core execution engine. Manages reactive scheduling, effect registration, and plugin lifecycle.' },
  'Scheduler': { header:'class Scheduler', type:'import from ./scheduler', desc:'Priority-based task queue with FIFO within priority tiers. Supports low | normal | high | critical.' },
  'ReactiveSystem': { header:'class ReactiveSystem', type:'import from ./reactive', desc:'Fine-grained reactivity system. Tracks dependencies and schedules re-computation on change.' },
  'effect': { header:'method effect<T>', type:'(key: string, fn: () => T): Effect', desc:'Register a reactive effect. Automatically tracks dependencies and re-runs on invalidation.' },
  'boot': { header:'private async boot', type:'(): Promise<void>', desc:'Internal bootstrap sequence. Initializes scheduler, sets up reactive observers.' },
  'VERSION': { header:'const VERSION', type:'string', desc:'Current runtime version string. Injected into console log on boot.' },
};

document.getElementById('codeArea').addEventListener('mousemove', e => {
  const word = getWordAt(e.target, e);
  const tt = document.getElementById('tooltip');
  if (word && TOOLTIPS[word]) {
    const d = TOOLTIPS[word];
    document.getElementById('ttHeader').textContent = d.header;
    document.getElementById('ttType').textContent = d.type;
    document.getElementById('ttDesc').textContent = d.desc;
    tt.style.left = (e.clientX + 12) + 'px';
    tt.style.top = (e.clientY + 12) + 'px';
    tt.classList.add('visible');
  } else {
    tt.classList.remove('visible');
  }
});

document.getElementById('codeArea').addEventListener('mouseleave', () => {
  document.getElementById('tooltip').classList.remove('visible');
});

function getWordAt(el, e) {
  try {
    const text = el.textContent || '';
    if (!text) return null;
    const match = text.match(/\b([A-Za-z][A-Za-z0-9_]*)\b/g);
    if (!match) return null;
    return match.find(w => TOOLTIPS[w]) || null;
  } catch { return null; }
}
